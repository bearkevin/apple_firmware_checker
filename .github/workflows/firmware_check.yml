on:
  schedule:
    - cron: '*/15 17-22 * * 1-5'
  workflow_dispatch:

jobs:
  check-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run firmware checker
        run: python3 firmware_checker.py

      - name: Detect update attachment
        id: detect_updates
        shell: bash
        run: |
          mapfile -t update_files < <(git status --porcelain -- '*_updates.txt' | awk '{print $2}')

          if [ "${#update_files[@]}" -eq 0 ]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          attachment_path="${update_files[0]}"

          echo "has_updates=true" >> "$GITHUB_OUTPUT"
          echo "attachment_path=$attachment_path" >> "$GITHUB_OUTPUT"

      - name: Send update email
        id: send_email
        if: steps.detect_updates.outputs.has_updates == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v6
        with:
          connection_url: ${{ secrets.MAIL_CONNECTION }}
          subject: "[Apple Firmware Checker] New firmware updates - ${{ github.run_id }}"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ vars.MAIL_FROM }}
          body: |
            New firmware updates were detected in ${{ github.repository }}.

            Attachment: ${{ steps.detect_updates.outputs.attachment_path }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ steps.detect_updates.outputs.attachment_path }}

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update firmware data"
          file_pattern: "*.db *.xml *.txt"
          commit_user_name: "Github Actions Bot"
          commit_user_email: "actions@github.com"

      - name: Fail workflow if email notification failed
        if: always() && steps.detect_updates.outputs.has_updates == 'true' && steps.send_email.outcome == 'failure'
        run: |
          echo "Firmware update email failed to send."
          exit 1
